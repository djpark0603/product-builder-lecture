<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBP to JPG Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>WEBP to JPG Converter</h1>
        <div class="input-group">
            <label for="webp-input">Select Files:</label>
            <input type="file" id="webp-input" accept="image/webp" multiple>
        </div>
        <div class="input-group">
            <label for="folder-input">Select Folder:</label>
            <input type="file" id="folder-input" accept="image/webp" webkitdirectory directory>
        </div>
        <button id="convert-btn">Convert All to JPG</button>
        <div id="file-list" class="file-list"></div>
        <div id="action-buttons" style="display: none;">
            <button id="download-all-btn">Download All (ZIP)</button>
        </div>

        <hr style="margin: 2rem 0; border: 0; border-top: 1px solid #eee;">

        <div class="affiliate-section">
            <h2>Affiliate Inquiry</h2>
            <form action="https://formspree.io/f/xjgagarg" method="POST">
                <div class="input-group">
                    <label for="full-name">Name</label>
                    <input type="text" id="full-name" name="name" required placeholder="Your Name">
                </div>
                <div class="input-group">
                    <label for="email-address">Email</label>
                    <input type="email" id="email-address" name="_replyto" required placeholder="email@example.com">
                </div>
                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required placeholder="Tell us about your proposal..." rows="4"></textarea>
                </div>
                <button type="submit">Submit Inquiry</button>
            </form>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
