<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEBP to JPG Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>WEBP to JPG Converter</h1>
        <input type="file" id="webp-input" accept="image/webp">
        <button id="convert-btn">Convert to JPG</button>
        <img id="jpg-output" style="display: none;">
        <a id="download-link" style="display: none;">Download JPG</a>
    </div>
    <script src="main.js"></script>
</body>
</html>
